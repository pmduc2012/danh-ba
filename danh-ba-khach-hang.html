<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Danh bạ KH Bánh nhà Thu">
<meta name="theme-color" content="#0f172a">
<title>Danh bạ KH Bánh nhà Thu</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f172a;--s1:#1e293b;--s2:#263347;--s3:#2d3f57;
  --bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.14);
  --ac:#38bdf8;--ac2:#0ea5e9;--tx:#f1f5f9;--mu:#94a3b8;
  --ok:#34d399;--er:#f87171;--warn:#fbbf24;
  --r:14px;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Be Vietnam Pro',sans-serif;color:var(--tx)}
.shell{display:flex;flex-direction:column;height:100%;padding-top:var(--st);padding-bottom:var(--sb)}

/* HEADER */
.hdr{padding:12px 16px 0;border-bottom:1px solid var(--bd);flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px}
.hdr-title{font-size:16px;font-weight:600;letter-spacing:-.3px}
.hdr-title span{color:var(--ac)}
.hdr-right{display:flex;align-items:center;gap:6px}
.chip{font-size:11px;background:var(--s2);color:var(--ac);padding:3px 10px;border-radius:99px;border:1px solid var(--bd)}
.icon-btn{background:none;border:none;cursor:pointer;padding:6px;display:flex;align-items:center;border-radius:50%}
.icon-btn svg{width:16px;height:16px;stroke:var(--mu)}
.icon-btn.spin svg{animation:spin .9s linear infinite;stroke:var(--ac)}
@keyframes spin{to{transform:rotate(360deg)}}
.offline{background:rgba(248,113,113,.12);padding:4px 0;text-align:center;font-size:11px;color:var(--er);display:none}
.offline.show{display:block}

/* TABS */
.tabs{display:flex;background:var(--bg);border-top:1px solid var(--bd);flex-shrink:0}
.tab{flex:1;padding:8px 2px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--mu);font-family:inherit;cursor:pointer;font-size:10px;font-weight:500;transition:color .2s}
.tab.active{color:var(--ac)}
.tab svg{width:20px;height:20px;stroke-width:1.8}

/* PAGES */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:14px 14px 20px;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}

/* SEARCH */
.srch-box{position:relative;margin-bottom:14px}
.srch-box input{width:100%;padding:12px 38px 12px 42px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);font-family:inherit;font-size:15px;color:var(--tx);outline:none;-webkit-appearance:none;transition:border-color .2s}
.srch-box input::placeholder{color:var(--mu)}
.srch-box input:focus{border-color:var(--ac)}
.srch-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--mu);pointer-events:none}
.srch-clr{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:var(--s2);border:none;border-radius:50%;width:22px;height:22px;display:none;align-items:center;justify-content:center;cursor:pointer}
.srch-clr svg{width:11px;height:11px;stroke:var(--mu)}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:13px 14px;margin-bottom:10px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1}}
.card-hdr{display:flex;align-items:center;gap:11px;margin-bottom:10px}
.av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
.av-0{background:rgba(56,189,248,.18);color:#38bdf8}
.av-1{background:rgba(52,211,153,.18);color:#34d399}
.av-2{background:rgba(251,191,36,.18);color:#fbbf24}
.av-3{background:rgba(248,113,113,.18);color:#f87171}
.av-4{background:rgba(167,139,250,.18);color:#a78bfa}
.av-5{background:rgba(251,146,60,.18);color:#fb923c}
.card-name-row{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.card-name{font-size:15px;font-weight:600}
.badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
.badge-new{background:rgba(148,163,184,.12);color:var(--mu);border:1px solid rgba(148,163,184,.2)}
.badge-quen{background:rgba(56,189,248,.12);color:#38bdf8;border:1px solid rgba(56,189,248,.25)}
.badge-vip{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.card-body{display:flex;flex-direction:column;gap:6px}
.info-row{display:flex;align-items:flex-start;gap:9px;font-size:13px}
.ii{width:15px;flex-shrink:0;margin-top:2px;opacity:.5}
.iv{color:var(--tx);flex:1}
.iv.empty{color:var(--mu);font-style:italic;font-size:12px}
.card-meta{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}
.order-count{display:inline-flex;align-items:center;gap:5px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:99px;padding:3px 10px;font-size:12px;font-weight:600;color:var(--warn)}
.order-count svg{width:12px;height:12px}
.meta-spacer{flex:1}
.card-acts{display:flex;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.act{flex:1;padding:8px 4px;border-radius:9px;border:1px solid var(--bd);background:var(--s2);color:var(--mu);font-family:inherit;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;text-decoration:none;-webkit-appearance:none;transition:transform .12s}
.act:active{transform:scale(.95)}
.act.call{color:var(--ok);border-color:rgba(52,211,153,.25);background:rgba(52,211,153,.08)}
.act.order{color:var(--ac);border-color:rgba(56,189,248,.25);background:rgba(56,189,248,.08)}
.act.edit{color:var(--mu);border-color:var(--bd);background:var(--s2)}
.act.del{color:var(--er);border-color:rgba(248,113,113,.25);background:rgba(248,113,113,.08)}
.act svg{width:13px;height:13px}

/* FORM */
.fcard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px 14px;margin-bottom:12px}
.fg{margin-bottom:14px}
.fg:last-child{margin-bottom:0}
.fl{font-size:11px;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px}
.fi{width:100%;padding:11px 13px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;font-family:inherit;font-size:15px;color:var(--tx);outline:none;-webkit-appearance:none;transition:border-color .2s}
.fi::placeholder{color:var(--mu)}
.fi:focus{border-color:var(--ac)}
select.fi{cursor:pointer}
.btn-main{width:100%;padding:13px;background:var(--ac2);border:none;border-radius:var(--r);font-family:inherit;font-size:15px;font-weight:600;color:#fff;cursor:pointer;-webkit-appearance:none}
.btn-main:active{opacity:.85}
.btn-main:disabled{opacity:.5}
.btn-sec{width:100%;padding:13px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);font-family:inherit;font-size:15px;color:var(--mu);cursor:pointer;margin-top:8px}

/* MENU ITEMS IN ORDER */
.menu-cat-title{font-size:12px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 8px;padding:0 2px}
.menu-item-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s2);border-radius:10px;margin-bottom:6px;border:1px solid transparent;transition:border-color .15s}
.menu-item-row.selected{border-color:var(--ac)}
.mi-name{flex:1;font-size:14px}
.mi-price{font-size:13px;color:var(--mu);white-space:nowrap}
.mi-qty{display:flex;align-items:center;gap:6px}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit}
.qty-btn:active{transform:scale(.9)}
.qty-btn.p{color:var(--ok);border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.08)}
.qty-btn.m{color:var(--er);border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.08)}
.qty-num{font-size:14px;font-weight:600;min-width:18px;text-align:center}

/* ORDER SUMMARY */
.order-summary{background:var(--s2);border-radius:10px;padding:12px 14px;margin-top:12px}
.os-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.os-row:last-child{margin-bottom:0;font-weight:600;font-size:15px;color:var(--ac)}
.os-label{color:var(--mu)}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--mu)}
.empty svg{width:46px;height:46px;margin:0 auto 12px;display:block;opacity:.2}
.empty p{font-size:14px}
.empty small{font-size:12px;opacity:.6;display:block;margin-top:3px}

/* SECTION TITLE */
.sec-title{font-size:12px;color:var(--mu);margin-bottom:10px;padding:0 2px}

/* ORDER HISTORY CARD */
.ohcard{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.oh-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.oh-date{font-size:13px;font-weight:500}
.oh-total{font-size:14px;font-weight:600;color:var(--ac)}
.oh-items{font-size:12px;color:var(--mu);margin-bottom:8px;line-height:1.5}
.oh-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px}
.st-cho{background:rgba(251,191,36,.12);color:var(--warn);border:1px solid rgba(251,191,36,.25)}
.st-giao{background:rgba(56,189,248,.12);color:var(--ac);border:1px solid rgba(56,189,248,.25)}
.st-xong{background:rgba(52,211,153,.12);color:var(--ok);border:1px solid rgba(52,211,153,.25)}
.st-tienmat{background:rgba(52,211,153,.12);color:var(--ok);border:1px solid rgba(52,211,153,.25)}
.st-cktoan{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.25)}
.st-choct{background:rgba(251,146,60,.12);color:#fb923c;border:1px solid rgba(251,146,60,.25)}
.status-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.status-opt{padding:7px 13px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:var(--s2);color:var(--mu);font-family:inherit;transition:all .15s}
.status-opt:active{transform:scale(.95)}
.status-opt.active-cho{background:rgba(251,191,36,.15);color:var(--warn);border-color:rgba(251,191,36,.4)}
.status-opt.active-giao{background:rgba(56,189,248,.15);color:var(--ac);border-color:rgba(56,189,248,.4)}
.status-opt.active-xong{background:rgba(52,211,153,.15);color:var(--ok);border-color:rgba(52,211,153,.4)}
.status-opt.active-tienmat{background:rgba(52,211,153,.15);color:var(--ok);border-color:rgba(52,211,153,.4)}
.status-opt.active-cktoan{background:rgba(167,139,250,.15);color:#a78bfa;border-color:rgba(167,139,250,.4)}
.status-opt.active-choct{background:rgba(251,146,60,.15);color:#fb923c;border-color:rgba(251,146,60,.4)}
.oh-acts{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}

/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px}
.stat-label{font-size:11px;color:var(--mu);margin-bottom:6px}
.stat-val{font-size:22px;font-weight:600;color:var(--tx)}
.stat-sub{font-size:11px;color:var(--mu);margin-top:2px}
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s1);border-radius:10px;margin-bottom:6px;border:1px solid var(--bd)}
.rank-num{font-size:13px;font-weight:600;color:var(--mu);width:18px}
.rank-name{flex:1;font-size:14px}
.rank-val{font-size:13px;color:var(--ac);font-weight:500}

/* LOADING */
.loading{position:fixed;inset:0;background:rgba(15,23,42,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:12px}
.loading p{color:var(--mu);font-size:13px}
.spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}

/* TOAST */
.toast{position:fixed;bottom:calc(60px + var(--sb) + 10px);left:50%;transform:translateX(-50%) translateY(14px);background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:9px 20px;border-radius:99px;font-size:13px;font-weight:500;pointer-events:none;opacity:0;transition:all .25s;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{color:var(--ok);border-color:rgba(52,211,153,.3)}
.toast.er{color:var(--er);border-color:rgba(248,113,113,.3)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:flex-end;justify-content:center;z-index:150;padding-bottom:var(--sb)}
.modal-bg.open{display:flex}
.modal{background:var(--s1);border-radius:20px 20px 0 0;padding:18px 14px 22px;width:100%;max-width:540px;border-top:1px solid var(--bd);max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-title{font-size:16px;font-weight:600;text-align:center;margin-bottom:18px}
.modal-acts{display:flex;gap:9px;margin-top:14px}
.btn-cancel{flex:1;padding:12px;background:var(--s2);border:1px solid var(--bd);border-radius:11px;font-family:inherit;font-size:14px;color:var(--mu);cursor:pointer}
.btn-ok{flex:1;padding:12px;background:var(--ac2);border:none;border-radius:11px;font-family:inherit;font-size:14px;font-weight:600;color:#fff;cursor:pointer}
.btn-ok:disabled{opacity:.5}

/* MENU MGMT */
.menu-mgmt-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--s2);border-radius:9px;margin-bottom:6px}
.mm-name{flex:1;font-size:13px}
.mm-price{font-size:12px;color:var(--mu)}
.mm-del{background:none;border:none;color:var(--er);cursor:pointer;padding:4px;opacity:.6}

.card-info-compact{display:flex;flex-direction:column;gap:4px;margin:8px 0 10px}
.ci-row{display:flex;align-items:flex-start;gap:7px;font-size:13px}
.ci-icon{font-size:12px;flex-shrink:0;margin-top:1px;opacity:.8}
.ci-val{color:var(--tx);flex:1;line-height:1.4}
.act.maps{color:#34d399;border-color:rgba(52,211,153,.25);background:rgba(52,211,153,.08)}
.sort-bar{display:flex;gap:7px;margin-bottom:12px}
.sort-opt{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--s2);color:var(--mu);font-family:inherit;transition:all .15s}
.sort-opt.active{background:var(--ac2);color:#fff;border-color:var(--ac2)}

/* BIRTHDAY INPUT AUTO-FORMAT */
.bday-banner{background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(56,189,248,.1));border:1px solid rgba(167,139,250,.25);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.bday-banner p{font-size:13px;flex:1}
.bday-banner strong{color:#a78bfa}

.page::-webkit-scrollbar{width:3px}
.page::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
mark{background:rgba(56,189,248,.2);color:var(--ac);border-radius:3px;padding:0 2px}
</style>
</head>
<body>
<div id="ld" class="loading"><div class="spinner"></div><p>Đang tải dữ liệu...</p></div>

<div class="shell">
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-title">Danh bạ KH <span>Bánh nhà Thu</span></div>
      <div class="hdr-right">
        <button class="icon-btn" id="sync-btn" onclick="syncNow()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        </button>
        <div class="chip" id="count-chip">0 khách</div>
      </div>
    </div>
    <div class="offline" id="offline-bar">⚠️ Mất kết nối</div>
  </div>

  <div class="pages">
    <!-- SEARCH -->
    <div class="page active" id="page-search">
      <div class="srch-box">
        <svg class="srch-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="srch-inp" placeholder="Tên FB, địa chỉ, số điện thoại..." oninput="doSearch()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="srch-clr" id="srch-clr" onclick="clearSearch()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div id="srch-res"><div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>Tìm kiếm khách hàng</p><small>Nhập tên Facebook, địa chỉ hoặc số điện thoại</small></div></div>
    </div>

    <!-- ADD CUSTOMER -->
    <div class="page" id="page-add">
      <div class="fcard">
        <div class="fg"><label class="fl">Tên Facebook *</label><input class="fi" type="text" id="add-fb" placeholder="VD: Nguyễn Văn A" autocomplete="off"></div>
        <div class="fg"><label class="fl">Địa Chỉ</label><input class="fi" type="text" id="add-addr" placeholder="VD: 123 Lê Duẩn, Đông Hà"></div>
        <div class="fg"><label class="fl">Số Điện Thoại</label><input class="fi" type="tel" id="add-phone" placeholder="VD: 0901234567"></div>
        <div class="fg"><label class="fl">Ngày Sinh Nhật</label><input class="fi" type="text" id="add-bday" placeholder="VD: 15/08/1990" inputmode="numeric" maxlength="10" oninput="bdayInput(event)"></div>
      </div>
      <button class="btn-main" id="btn-add-cust" onclick="addCustomer()">Lưu Khách Hàng</button>
    </div>

    <!-- LIST -->
    <div class="page" id="page-list">
      <div class="sort-bar">
        <button class="sort-opt active" id="sort-recent" onclick="setSort('recent')">Gần đây</button>
        <button class="sort-opt" id="sort-az" onclick="setSort('az')">A → Z</button>
      </div>
      <div class="sec-title" id="list-label">Tất cả</div>
      <div id="list-res"></div>
    </div>

    <!-- ORDERS -->
    <div class="page" id="page-orders">
      <div class="sec-title" id="orders-label">Đơn hàng gần đây</div>
      <div id="orders-res"></div>
    </div>

    <!-- STATS -->
    <div class="page" id="page-stats">
      <div id="stats-content"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-search" onclick="switchTab('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Tìm
    </button>
    <button class="tab" id="tab-add" onclick="switchTab('add')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Thêm KH
    </button>
    <button class="tab" id="tab-list" onclick="switchTab('list')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>DS KH
    </button>
    <button class="tab" id="tab-orders" onclick="switchTab('orders')">

<script>
const API='https://script.google.com/macros/s/AKfycbydXy5h7Bn-s4hFVFVFEoufJJcrLrVHwO7CgKHmBMyTVjgQDTGZ371xPt-2PnJ_g2jv/exec';
const CK='danh_ba_v4';
let customers=[],menu=[],orders=[];
let editId=null,orderCustId=null,orderQty={},detailOrderId=null;

// ── STORAGE ──
function cLoad(){try{const d=JSON.parse(localStorage.getItem(CK)||'{}');customers=d.customers||[];menu=d.menu||[];orders=d.orders||[];}catch{customers=[];menu=[];orders=[];}}
function cSave(){try{localStorage.setItem(CK,JSON.stringify({customers,menu,orders}));}catch{}}

// ── JSONP ──
function jsonp(url){
  return new Promise((res,rej)=>{
    const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const sc=document.createElement('script');
    const tm=setTimeout(()=>{cleanup();rej(new Error('timeout'));},12000);
    function cleanup(){clearTimeout(tm);delete window[cb];if(sc.parentNode)sc.parentNode.removeChild(sc);}
    window[cb]=function(d){cleanup();res(d);};
    sc.onerror=()=>{cleanup();rej(new Error('net'));};
    sc.src=url+(url.includes('?')?'&':'?')+'callback='+cb+'&t='+Date.now();
    document.head.appendChild(sc);
  });
}
async function apiPost(body){
  await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});
  return {ok:true};
}

// ── LOAD ──
function fixPhone(p){
  if(!p)return'';
  const s=String(p).replace(/\.0*$/,'').replace(/\s/g,'');
  // Nếu là số thuần 9 chữ số (mất số 0 đầu do Sheets) thì thêm lại
  if(/^\d{9}$/.test(s))return'0'+s;
  return s;
}
async function loadAll(){
  try{
    const r=await jsonp(API+'?action=getAll');
    if(r&&r.ok){
      customers=(r.customers||[]).map(c=>({...c,phone:fixPhone(c.phone),id:String(c.id),orders:Number(c.orders)||0}));
      menu=r.menu&&r.menu.length?r.menu:menu;
      orders=(r.orders||[]).map(o=>({...o,id:String(o.id),customerId:String(o.customerId)}));
      cSave();
      document.getElementById('offline-bar').classList.remove('show');
      return true;
    }
  }catch(e){console.log(e);}
  cLoad();
  document.getElementById('offline-bar').classList.add('show');
  return false;
}

(async()=>{
  cLoad();renderList();updateCount();
  await loadAll();
  document.getElementById('ld').style.display='none';
  renderList();updateCount();
  checkBirthdays();
})();

async function syncNow(){
  const b=document.getElementById('sync-btn');b.classList.add('spin');
  const ok=await loadAll();b.classList.remove('spin');
  renderList();updateCount();renderOrders();renderStats();
  showToast(ok?'✓ Đã đồng bộ!':'Không có internet',ok?'ok':'er');
}

// ── HELPERS ──
function fmtDate(bd){
  if(!bd)return'';
  const s=String(bd);
  // Raw JS Date string từ Google Sheets (VD: "Sat Aug 15 1970 00:00:00 GMT+0700")
  if(s.includes('GMT')||s.includes('00:00:00')){
    const d=new Date(s);
    if(!isNaN(d)){
      const day=String(d.getDate()).padStart(2,'0');
      const mon=String(d.getMonth()+1).padStart(2,'0');
      return`${day}/${mon}/${d.getFullYear()}`;
    }
  }
  // YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;}
  // Đã là dd/mm/yyyy
  return s;
}
function parseDateToISO(bd){
  if(!bd)return'';
  if(bd.includes('/')){const[d,m,y]=bd.split('/');return`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;}
  return bd;
}
function initials(n){const p=n.trim().split(/\s+/);return p.length===1?p[0][0].toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase();}
function avCls(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))&0xffff;return'av-'+(h%6);}
function hlText(t,q){if(!q||!t)return t||'';return t.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');}
function updateCount(){document.getElementById('count-chip').textContent=customers.length+' khách';}
function fmt(n){return new Intl.NumberFormat('vi-VN').format(n)+'đ';}
function todayStr(){return new Date().toISOString().slice(0,10);}
function badge(orders){
  if(orders>=50)return`<span class="badge badge-vip">👑 VIP</span>`;
  if(orders>=10)return`<span class="badge badge-quen">⭐ Khách quen</span>`;
  return`<span class="badge badge-new">Khách mới</span>`;
}
function statusLabel(s){
  const map={
    'cho':'⏳ Chờ xử lý','giao':'🚚 Đang giao','xong':'✓ Hoàn thành',
    'tienmat':'💵 Tiền mặt','cktoan':'✅ Đã chuyển khoản','choct':'🔄 Chờ chuyển khoản'
  };
  const cls={'cho':'st-cho','giao':'st-giao','xong':'st-xong','tienmat':'st-tienmat','cktoan':'st-cktoan','choct':'st-choct'};
  return`<span class="oh-status ${cls[s]||'st-cho'}">${map[s]||'⏳ Chờ xử lý'}</span>`;
}

// ── BIRTHDAYS ──
function checkBirthdays(){
  const today=todayStr().slice(5);
  const soon=customers.filter(c=>{
    if(!c.birthday)return false;
    const bd=String(c.birthday).slice(5,10);
    if(!bd||bd.length<5)return false;
    const diff=dayDiff(today,bd);
    return diff>=0&&diff<=3;
  });
  if(!soon.length)return;
  const el=document.getElementById('srch-res');
  const banner=soon.map(c=>`<div class="bday-banner">
    <span style="font-size:22px">🎂</span>
    <p>Sinh nhật <strong>${c.fb}</strong> — ${fmtDate(c.birthday)}</p>
  </div>`).join('');
  el.innerHTML=banner+el.innerHTML;
}
function dayDiff(today,bd){
  const [tm,td]=today.split('-').map(Number);
  const [bm,bdd]=bd.split('-').map(Number);
  const t=tm*31+td,b=bm*31+bdd;
  return b-t;
}

// ── CUSTOMER CARD ──
function custCard(c,q,showActs){
  const mapsUrl=c.addr?`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.addr)}`:'';
  return`<div class="card">

        <div class="card-name">${hlText(c.fb,q)}</div>
        <div class="badges">${badge(c.orders||0)}</div>

      <span class="order-count" style="flex-shrink:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>${c.orders||0}</span>
    </div>
    <div class="card-info-compact">
      ${c.addr?`<div class="ci-row"><span class="ci-icon">📍</span><span class="ci-val">${hlText(c.addr,q)}</span></div>`:''}
      ${c.phone?`<div class="ci-row"><span class="ci-icon">📞</span><span class="ci-val">${hlText(c.phone,q)}</span></div>`:''}
      ${c.birthday?`<div class="ci-row"><span class="ci-icon">🎂</span><span class="ci-val">${fmtDate(c.birthday)}</span></div>`:''}
    </div>
    <div class="card-acts">
      ${c.phone?`<a class="act call" href="tel:${c.phone}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.72A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.91a16 16 0 006.16 6.16l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>Gọi</a>`:''}
      ${mapsUrl?`<a class="act maps" href="${mapsUrl}" target="_blank">🗺 Maps</a>`:''}
      <button class="act order" onclick="openOrder('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>Đặt</button>
      ${showActs?`<button class="act edit" onclick="openEdit('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Sửa</button>
      <button class="act del" onclick="delCustomer('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>Xoá</button>`:''}
    </div>
  </div>`;
}

// ── SEARCH ──
function doSearch(){
  const q=document.getElementById('srch-inp').value.trim();
  document.getElementById('srch-clr').style.display=q?'flex':'none';
  const el=document.getElementById('srch-res');
  if(!q){el.innerHTML=emptyHTML('Tìm kiếm khách hàng','Nhập tên Facebook, địa chỉ hoặc số điện thoại');return;}
  const ql=q.toLowerCase();
  const res=customers.filter(c=>c.fb.toLowerCase().includes(ql)||(c.addr&&c.addr.toLowerCase().includes(ql))||(c.phone&&c.phone.includes(q)));
  el.innerHTML=res.length?res.map(c=>custCard(c,q,true)).join(''):emptyHTML('Không tìm thấy','Thử từ khoá khác');
}
function clearSearch(){document.getElementById('srch-inp').value='';doSearch();}

// ── ADD CUSTOMER ──
async function addCustomer(){
  const fb=document.getElementById('add-fb').value.trim();
  if(!fb){showToast('Vui lòng nhập tên Facebook','er');return;}
  const phone=document.getElementById('add-phone').value.trim();
  if(phone){
    const dup=customers.find(c=>c.phone&&c.phone===phone);
    if(dup){showToast('SĐT này đã có: '+dup.fb,'er');return;}
  }
  const btn=document.getElementById('btn-add-cust');btn.disabled=true;btn.textContent='Đang lưu...';
  const c={id:Date.now().toString(),fb,addr:document.getElementById('add-addr').value.trim(),phone,birthday:parseDateToISO(document.getElementById('add-bday').value.trim()),orders:0};
  // Lưu local ngay lập tức (optimistic)
  customers.push(c);cSave();updateCount();renderList();
  ['add-fb','add-addr','add-phone','add-bday'].forEach(id=>document.getElementById(id).value='');
  showToast('Đã lưu: '+fb,'ok');setTimeout(()=>switchTab('list'),400);
  btn.disabled=false;btn.textContent='Lưu Khách Hàng';
  // Gửi server ngầm
  apiPost({action:'add',sheet:'KhachHang',...c}).catch(()=>showToast('Lưu server thất bại!','er'));
}

// ── EDIT CUSTOMER ──
function openEdit(id){
  const c=customers.find(x=>x.id===id);if(!c)return;
  editId=id;
  document.getElementById('edit-fb').value=c.fb;
  document.getElementById('edit-addr').value=c.addr||'';
  document.getElementById('edit-phone').value=c.phone||'';
  document.getElementById('edit-bday').value=fmtDate(c.birthday||'');
  document.getElementById('edit-modal').classList.add('open');
}
async function saveEdit(){
  const fb=document.getElementById('edit-fb').value.trim();
  if(!fb){showToast('Vui lòng nhập tên Facebook','er');return;}
  const btn=document.getElementById('btn-edit-ok');btn.disabled=true;btn.textContent='Đang lưu...';
  const idx=customers.findIndex(c=>c.id===editId);if(idx===-1){closeModal('edit-modal');return;}
  const updated={...customers[idx],fb,addr:document.getElementById('edit-addr').value.trim(),phone:document.getElementById('edit-phone').value.trim(),birthday:parseDateToISO(document.getElementById('edit-bday').value.trim())};
  customers[idx]=updated;cSave();closeModal('edit-modal');renderList();showToast('Đã cập nhật','ok');
  btn.disabled=false;btn.textContent='Lưu';
  apiPost({action:'update',sheet:'KhachHang',...updated}).catch(()=>showToast('Lưu server thất bại!','er'));
}
async function delCustomer(id){
  if(!confirm('Xoá khách hàng này?'))return;
  try{
    await apiPost({action:'delete',sheet:'KhachHang',id});
    customers=customers.filter(c=>c.id!==id);cSave();updateCount();renderList();showToast('Đã xoá','');
  }catch{showToast('Lỗi kết nối!','er');}
}

// ── ORDER MODAL ──
function openOrder(custId){
  const c=customers.find(x=>x.id===custId);if(!c)return;
  orderCustId=custId;orderQty={};
  document.getElementById('order-cust-name').textContent=c.fb;
  document.getElementById('order-date').value=todayStr();
  document.getElementById('os-discount').value=0;
  document.getElementById('order-note').value='';
  renderOrderMenu();
  document.getElementById('order-modal').classList.add('open');
}

function renderOrderMenu(){
  const cats=[...new Set(menu.filter(m=>m.active!=='0').map(m=>m.cat))];
  let html='';
  cats.forEach(cat=>{
    const items=menu.filter(m=>m.cat===cat&&m.active!=='0');
    html+=`<div class="menu-cat-title">${cat}</div>`;
    items.forEach(m=>{
      const qty=orderQty[m.id]||0;
      html+=`<div class="menu-item-row${qty>0?' selected':''}" id="mir-${m.id}">
        <div class="mi-name">${m.name}</div>
        <div class="mi-price">${fmt(m.price)}</div>
        <div class="mi-qty">
          <button class="qty-btn m" onclick="changeQty('${m.id}',-1)">−</button>
          <span class="qty-num" id="qty-${m.id}">${qty}</span>
          <button class="qty-btn p" onclick="changeQty('${m.id}',1)">+</button>
        </div>
      </div>`;
    });
  });
  document.getElementById('order-menu-list').innerHTML=html;
  calcTotal();
}

function changeQty(id,d){
  orderQty[id]=Math.max(0,(orderQty[id]||0)+d);
  const el=document.getElementById('qty-'+id);if(el)el.textContent=orderQty[id];
  const row=document.getElementById('mir-'+id);
  if(row)row.classList.toggle('selected',orderQty[id]>0);
  calcTotal();
}

function calcTotal(){
  let sub=0;
  // Rau câu discount: mua 2+ hộp rau câu giảm 5k mỗi cặp
  let rauCauCount=0;
  menu.forEach(m=>{
    const qty=orderQty[m.id]||0;
    sub+=m.price*qty;
    if(m.cat==='Rau câu')rauCauCount+=qty;
  });
  const rauCauDisc=Math.floor(rauCauCount/2)*5000;
  const manualDisc=(Number(document.getElementById('os-discount').value)||0)*1000;
  const total=Math.max(0,sub-rauCauDisc-manualDisc);
  document.getElementById('os-sub').textContent=fmt(sub);
  document.getElementById('os-total').textContent=fmt(total);
  if(rauCauDisc>0){
    document.getElementById('os-sub').title='Giảm rau câu: -'+fmt(rauCauDisc);
  }
  return{sub,rauCauDisc,manualDisc,total};
}

async function saveOrder(){
  const items=Object.entries(orderQty).filter(([,q])=>q>0);
  if(!items.length){showToast('Chưa chọn món nào','er');return;}
  const {rauCauDisc,manualDisc,total}=calcTotal();
  const discount=rauCauDisc+manualDisc;
  const itemsStr=items.map(([id,q])=>{
    const m=menu.find(x=>x.id===id);
    return m?`${m.name}x${q}(${fmt(m.price*q)})`:id+'x'+q;
  }).join(', ');
  const btn=document.getElementById('btn-order-ok');btn.disabled=true;btn.textContent='Đang lưu...';
  const ord={id:Date.now().toString(),customerId:orderCustId,date:document.getElementById('order-date').value,items:itemsStr,total,discount,status:'cho',note:document.getElementById('order-note').value.trim()};
  try{
    // Lưu local ngay
    orders.push(ord);
    const idx=customers.findIndex(c=>c.id===orderCustId);
    if(idx>-1){customers[idx].orders=(customers[idx].orders||0)+1;}
    cSave();closeModal('order-modal');renderList();renderOrders();updateCount();
    showToast('Đã tạo đơn!','ok');
    btn.disabled=false;btn.textContent='Tạo đơn';
    // Gửi server ngầm
    apiPost({action:'add',sheet:'DonHang',...ord}).catch(()=>showToast('Lưu server thất bại!','er'));
  }catch{showToast('Lỗi kết nối!','er');btn.disabled=false;btn.textContent='Tạo đơn';}
}

// ── ORDER HISTORY ──
function renderOrders(filterCustId){
  let data=filterCustId?orders.filter(o=>o.customerId===filterCustId):[...orders];
  data=data.slice().reverse();
  document.getElementById('orders-label').textContent=filterCustId?'Lịch sử đơn':'Tất cả đơn hàng ('+data.length+')';
  const el=document.getElementById('orders-res');
  if(!data.length){el.innerHTML=emptyHTML('Chưa có đơn hàng','Tạo đơn từ trang danh sách khách');return;}
  el.innerHTML=data.map(o=>{
    const c=customers.find(x=>x.id===o.customerId);
    return`<div class="ohcard">
      <div class="oh-top">
        <span class="oh-date">${c?c.fb:'?'} · ${o.date}</span>
        <span class="oh-total">${fmt(o.total)}</span>
      </div>
      <div class="oh-items">${o.items}</div>
      ${o.discount>0?`<div style="font-size:11px;color:var(--ok);margin-bottom:6px">Giảm: ${fmt(o.discount)}</div>`:''}
      ${o.note?`<div style="font-size:12px;color:var(--mu);margin-bottom:6px">📝 ${o.note}</div>`:''}
      <div style="display:flex;align-items:center;justify-content:space-between">
        ${statusLabel(o.status)}
        <button class="act" style="flex:none;padding:5px 12px;font-size:12px" onclick="openOrderDetail('${o.id}')">Chi tiết</button>
      </div>
    </div>`;
  }).join('');
}

function openOrderDetail(id){
  const o=orders.find(x=>x.id===id);if(!o)return;
  detailOrderId=id;
  const c=customers.find(x=>x.id===o.customerId);
  const statuses=[
    {key:'cho',label:'⏳ Chờ xử lý'},
    {key:'giao',label:'🚚 Đang giao'},
    {key:'xong',label:'✓ Hoàn thành'},
    {key:'choct',label:'🔄 Chờ CK'},
    {key:'cktoan',label:'✅ Đã CK'},
    {key:'tienmat',label:'💵 Tiền mặt'},
  ];
  document.getElementById('order-detail-content').innerHTML=`
    <div style="margin-bottom:12px"><div class="fl">Khách hàng</div><div style="font-size:15px;font-weight:600;color:var(--ac)">${c?c.fb:'?'}</div></div>
    <div style="margin-bottom:12px"><div class="fl">Ngày mua</div><div style="font-size:15px">${o.date}</div></div>
    <div style="margin-bottom:12px"><div class="fl">Món đã mua</div><div style="font-size:14px;line-height:1.7">${o.items}</div></div>
    ${o.discount>0?`<div style="margin-bottom:8px"><div class="fl">Giảm giá</div><div style="color:var(--ok)">${fmt(o.discount)}</div></div>`:''}
    <div style="margin-bottom:14px"><div class="fl">Tổng tiền</div><div style="font-size:18px;font-weight:600;color:var(--ac)">${fmt(o.total)}</div></div>
    ${o.note?`<div style="margin-bottom:12px"><div class="fl">Ghi chú</div><div>${o.note}</div></div>`:''}
    <div class="fl">Trạng thái — chọn để cập nhật</div>
    <div class="status-row">
      ${statuses.map(s=>`<button class="status-opt${o.status===s.key?' active-'+s.key:''}" onclick="setStatus('${s.key}')">${s.label}</button>`).join('')}
    </div>
    <div style="margin-top:14px">
      <button class="act del" style="flex:none;padding:8px 14px;font-size:12px" onclick="delOrder('${o.id}')">Xoá đơn</button>
    </div>`;
  document.getElementById('order-detail-modal').classList.add('open');
}

async function setStatus(newStatus){
  const o=orders.find(x=>x.id===detailOrderId);if(!o)return;
  const updated={...o,status:newStatus};
  const idx=orders.findIndex(x=>x.id===detailOrderId);
  orders[idx]=updated;cSave();
  openOrderDetail(detailOrderId);renderOrders();
  showToast('Đã cập nhật trạng thái','ok');
  apiPost({action:'update',sheet:'DonHang',...updated}).catch(()=>showToast('Lưu server thất bại!','er'));
}

async function delOrder(id){
  if(!confirm('Xoá đơn hàng này?'))return;
  const o=orders.find(x=>x.id===id);
  try{
    await apiPost({action:'delete',sheet:'DonHang',id});
    orders=orders.filter(x=>x.id!==id);
    if(o){const idx=customers.findIndex(c=>c.id===o.customerId);if(idx>-1)customers[idx].orders=Math.max(0,(customers[idx].orders||0)-1);}
    cSave();closeModal('order-detail-modal');renderList();renderOrders();showToast('Đã xoá đơn','');
  }catch{showToast('Lỗi kết nối!','er');}
}

// ── MENU MANAGEMENT ──
function openMenuModal(){
  renderMenuMgmt();
  document.getElementById('menu-modal').classList.add('open');
}
function renderMenuMgmt(){
  const cats=[...new Set(menu.map(m=>m.cat))];
  let html='';
  cats.forEach(cat=>{
    html+=`<div class="menu-cat-title">${cat}</div>`;
    menu.filter(m=>m.cat===cat).forEach(m=>{
      html+=`<div class="menu-mgmt-item">
        <span class="mm-name">${m.name}</span>
        <span class="mm-price">${fmt(m.price)}</span>
        <button class="mm-del" onclick="delMenuItem('${m.id}')">✕</button>
      </div>`;
    });
  });
  document.getElementById('menu-list-mgmt').innerHTML=html;
}
async function addMenuItem(){
  const name=document.getElementById('new-item-name').value.trim();
  const price=Number(document.getElementById('new-item-price').value)*1000;
  const cat=document.getElementById('new-item-cat').value;
  if(!name||!price){showToast('Nhập đủ tên và giá','er');return;}
  const item={id:Date.now().toString(),cat,name,price,active:'1'};
  try{
    await apiPost({action:'add',sheet:'Menu',...item});
    menu.push(item);cSave();renderMenuMgmt();
    document.getElementById('new-item-name').value='';
    document.getElementById('new-item-price').value='';
    showToast('Đã thêm: '+name,'ok');
  }catch{showToast('Lỗi kết nối!','er');}
}
async function delMenuItem(id){
  if(!confirm('Xoá món này khỏi menu?'))return;
  try{
    await apiPost({action:'delete',sheet:'Menu',id});
    menu=menu.filter(m=>m.id!==id);cSave();renderMenuMgmt();showToast('Đã xoá','');
  }catch{showToast('Lỗi kết nối!','er');}
}

// ── STATS ──
function renderStats(){
  const totalRevenue=orders.reduce((s,o)=>s+o.total,0);
  const thisMonth=new Date().toISOString().slice(0,7);
  const monthOrders=orders.filter(o=>String(o.date).startsWith(thisMonth));
  const monthRevenue=monthOrders.reduce((s,o)=>s+o.total,0);

  // Top customers
  const custRevMap={};
  orders.forEach(o=>{const id=o.customerId;custRevMap[id]=(custRevMap[id]||0)+o.total;});
  const topCust=Object.entries(custRevMap).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,rev])=>{
    const c=customers.find(x=>x.id===id);return{name:c?c.fb:'?',val:rev};
  });

  // Top items
  const itemMap={};
  orders.forEach(o=>{
    o.items.split(',').forEach(part=>{
      const m=part.trim().match(/^(.+)x(\d+)/);
      if(m){const name=m[1].trim();itemMap[name]=(itemMap[name]||0)+Number(m[2]);}
    });
  });
  const topItems=Object.entries(itemMap).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([name,cnt])=>({name,val:cnt+'x'}));

  const vip=customers.filter(c=>c.orders>=50).length;
  const quen=customers.filter(c=>c.orders>=10&&c.orders<50).length;

  document.getElementById('stats-content').innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Tổng doanh thu</div><div class="stat-val" style="font-size:16px">${fmt(totalRevenue)}</div></div>
      <div class="stat-card"><div class="stat-label">Tháng này</div><div class="stat-val" style="font-size:16px">${fmt(monthRevenue)}</div><div class="stat-sub">${monthOrders.length} đơn</div></div>
      <div class="stat-card"><div class="stat-label">Tổng đơn hàng</div><div class="stat-val">${orders.length}</div></div>
      <div class="stat-card"><div class="stat-label">Khách hàng</div><div class="stat-val">${customers.length}</div><div class="stat-sub">👑${vip} VIP · ⭐${quen} quen</div></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px">
      <div class="sec-title" style="margin:0">Khách mua nhiều nhất</div>
    </div>
    ${topCust.length?topCust.map((x,i)=>`<div class="rank-item"><span class="rank-num">${i+1}</span><span class="rank-name">${x.name}</span><span class="rank-val">${fmt(x.val)}</span></div>`).join(''):emptyHTML('Chưa có dữ liệu','')}
    <div style="margin-top:14px;margin-bottom:8px;padding:0 2px" class="sec-title">Bánh bán chạy nhất</div>
    ${topItems.length?topItems.map((x,i)=>`<div class="rank-item"><span class="rank-num">${i+1}</span><span class="rank-name">${x.name}</span><span class="rank-val">${x.val}</span></div>`).join(''):emptyHTML('Chưa có dữ liệu','')}
    <div style="margin-top:14px">
      <button class="btn-sec" onclick="openMenuModal()">⚙️ Quản lý Menu</button>
    </div>`;
}

// ── SORT ──
let currentSort='recent';
function setSort(s){
  currentSort=s;
  document.getElementById('sort-recent').classList.toggle('active',s==='recent');
  document.getElementById('sort-az').classList.toggle('active',s==='az');
  renderList();
}

// ── BIRTHDAY AUTO-FORMAT ──
function bdayInput(e){
  let v=e.target.value.replace(/\D/g,'');
  if(v.length>2)v=v.slice(0,2)+'/'+v.slice(2);
  if(v.length>5)v=v.slice(0,5)+'/'+v.slice(5,9);
  e.target.value=v;
}

// ── LIST ──
function renderList(){
  let data=[...customers];
  if(currentSort==='az') data.sort((a,b)=>a.fb.localeCompare(b.fb,'vi'));
  else data.reverse();
  document.getElementById('list-label').textContent='Tất cả — '+data.length+' khách hàng';
  const el=document.getElementById('list-res');
  el.innerHTML=data.length?data.map(c=>custCard(c,'',true)).join(''):emptyHTML('Chưa có khách hàng','Thêm khách hàng ở tab Thêm KH');
}

// ── UTILS ──
function emptyHTML(p,s){return`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>${p}</p>${s?`<small>${s}</small>`:''}</div>`;}
function switchTab(tab){
  ['search','add','list','orders','stats'].forEach(t=>{
    document.getElementById('page-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='list')renderList();
  if(tab==='orders')renderOrders();
  if(tab==='stats')renderStats();
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
let toastTimer;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className='toast',2500);
}
['edit-modal','order-modal','menu-modal','order-detail-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModal(id);});
});
</script>
</body>
